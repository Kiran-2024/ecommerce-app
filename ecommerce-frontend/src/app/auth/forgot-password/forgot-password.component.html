<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Forgot Password</h2>
      <p>Enter your email to receive OTP</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Email is required
        </span>
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
          Invalid email format
        </span>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Sending OTP...' : 'Send OTP' }}
      </button>

      <div class="auth-links">
        <a routerLink="/auth/login">Back to Login</a>
      </div>
    </form>
  </div>
</div>
