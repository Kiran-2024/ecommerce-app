<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Register to get started</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="Enter your full name" />
        <span class="error" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('required')">
          Full name is required
        </span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Email is required
        </span>
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
          Invalid email format
        </span>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" formControlName="phoneNumber" placeholder="Enter 10-digit phone number" />
        <span class="error" *ngIf="form.get('phoneNumber')?.touched && form.get('phoneNumber')?.hasError('required')">
          Phone number is required
        </span>
        <span class="error" *ngIf="form.get('phoneNumber')?.touched && form.get('phoneNumber')?.hasError('pattern')">
          Enter valid 10-digit phone number
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Minimum 8 characters" />
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">
          Password is required
        </span>
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">
          Minimum 8 characters
        </span>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" formControlName="confirmPassword" placeholder="Re-enter your password" />
        <span class="error" *ngIf="form.get('confirmPassword')?.touched && form.hasError('mismatch')">
          Passwords do not match
        </span>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>

      <div class="auth-links">
        <span>Already have an account?</span>
        <a routerLink="/auth/login">Login</a>
      </div>
    </form>
  </div>
</div>
