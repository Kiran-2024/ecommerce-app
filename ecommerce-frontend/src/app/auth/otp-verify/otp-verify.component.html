<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Verify OTP</h2>
      <p>Enter the OTP sent to your email</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onVerify()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Email is required
        </span>
      </div>

      <div class="form-group">
        <label>OTP</label>
        <input type="text" formControlName="otp" placeholder="Enter 6-digit OTP" maxlength="6" />
        <span class="error" *ngIf="form.get('otp')?.touched && form.get('otp')?.hasError('required')">
          OTP is required
        </span>
        <span class="error" *ngIf="form.get('otp')?.touched && form.get('otp')?.hasError('minlength')">
          OTP must be 6 digits
        </span>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Verifying...' : 'Verify OTP' }}
      </button>

      <div class="auth-links">
        <span>Didn't receive OTP?</span>
        <button type="button" class="resend-btn" (click)="onResend()" [disabled]="resendLoading">
          {{ resendLoading ? 'Sending...' : 'Resend OTP' }}
        </button>
      </div>

      <div class="auth-links">
        <a routerLink="/auth/login">Back to Login</a>
      </div>
    </form>
  </div>
</div>
