<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Login to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Email is required
        </span>
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
          Invalid email format
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter your password" />
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">
          Password is required
        </span>
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">
          Minimum 6 characters
        </span>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <div class="auth-links">
        <a routerLink="/auth/forgot-password">Forgot Password?</a>
        <span>|</span>
        <a routerLink="/auth/register">Create Account</a>
      </div>
    </form>
  </div>
</div>
