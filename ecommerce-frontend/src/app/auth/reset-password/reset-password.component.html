<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Reset Password</h2>
      <p>Enter OTP and your new password</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" />
        <span class="error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Email is required
        </span>
      </div>

      <div class="form-group">
        <label>OTP</label>
        <input type="text" formControlName="otp" placeholder="Enter 6-digit OTP" maxlength="6" />
        <span class="error" *ngIf="form.get('otp')?.touched && form.get('otp')?.hasError('required')">
          OTP is required
        </span>
        <span class="error" *ngIf="form.get('otp')?.touched && form.get('otp')?.hasError('minlength')">
          OTP must be 6 digits
        </span>
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" formControlName="newPassword" placeholder="Minimum 8 characters" />
        <span class="error" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('required')">
          Password is required
        </span>
        <span class="error" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('minlength')">
          Minimum 8 characters
        </span>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" formControlName="confirmPassword" placeholder="Re-enter new password" />
        <span class="error" *ngIf="form.get('confirmPassword')?.touched && form.hasError('mismatch')">
          Passwords do not match
        </span>
      </div>

      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <div class="auth-links">
        <a routerLink="/auth/login">Back to Login</a>
      </div>
    </form>
  </div>
</div>
