<div class="cart-container">
  <h2 class="cart-title">My Cart</h2>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">Loading cart...</div>

  <!-- Empty Cart -->
  <div *ngIf="!loading && items.length === 0" class="empty-cart">
    <p>Your cart is empty!</p>
    <a routerLink="/products" class="btn-shop">Continue Shopping</a>
  </div>

  <!-- Cart Items -->
  <div *ngIf="!loading && items.length > 0" class="cart-content">
    <div class="cart-items">
      <div class="cart-item" *ngFor="let item of items">
        <img
          [src]="getImageUrl(item.imageUrl)"
          [alt]="item.productName"
          class="item-image"
          onerror="this.src='assets/images/no-image.png'"
        />
        <div class="item-details">
          <h4>{{ item.productName }}</h4>
          <p class="item-price">₹{{ item.price | number: '1.2-2' }}</p>
        </div>
        <div class="qty-controls">
          <button (click)="updateQty(item.cartItemId, item.quantity - 1)"
            [disabled]="item.quantity <= 1">−</button>
          <span>{{ item.quantity }}</span>
          <button (click)="updateQty(item.cartItemId, item.quantity + 1)">+</button>
        </div>
        <div class="item-subtotal">
          ₹{{ item.subtotal | number: '1.2-2' }}
        </div>
        <button class="btn-remove" (click)="removeItem(item.cartItemId)">
          Remove
        </button>
      </div>
    </div>

    <!-- Cart Summary -->
    <div class="cart-summary">
      <h3>Order Summary</h3>
      <div class="summary-row">
        <span>Items ({{ items.length }})</span>
        <span>₹{{ total | number: '1.2-2' }}</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span>₹{{ total | number: '1.2-2' }}</span>
      </div>
      <button class="btn-checkout" routerLink="/checkout">
        Proceed to Checkout
      </button>
      <button class="btn-clear" (click)="clearCart()">
        Clear Cart
      </button>
    </div>
  </div>
</div>
